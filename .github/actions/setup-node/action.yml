name: Setup Node.js

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
        cache: pnpm

    - name: Install Node modules
      run: pnpm install
      shell: bash
